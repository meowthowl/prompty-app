# Профиль канала "Prompty" — ИИ для маркетологов и малого бизнеса.
#
# Репозиционирование (22.07.2026): раньше канал был "про ИИ вообще" —
# слишком общая тема, конкурирующая с сотнями похожих каналов и уязвимая
# для восприятия "AI slop". Сузили до конкретной аудитории (маркетологи,
# предприниматели, владельцы малого бизнеса) — у них есть конкретные боли,
# для которых ИИ даёт измеримую пользу (экономия времени/денег), это лучше
# держит внимание и легче монетизируется (рекламодатели: маркетинговые
# инструменты, курсы, SaaS для бизнеса).

channel:
  name: "Prompty (ИИ для маркетинга и бизнеса)"
  topic_description: "про практическое применение нейросетей в маркетинге, продажах и малом бизнесе — конкретные инструменты и кейсы, а не общие новости про ИИ"
  tone: >
    Пиши живо и по-человечески, без канцелярита и без вступлений вроде
    "В современном мире...". Обращайся на "ты". Не используй лишние
    эмодзи (максимум 1-2 на пост). Всегда держи в голове, что читатель —
    маркетолог, предприниматель или владелец малого бизнеса: его интересует
    не "как это работает", а "сколько времени/денег это сэкономит и как
    внедрить прямо сегодня". Пост должен быть самодостаточным: читатель не
    переходит по ссылке, если не хочет.
  max_post_length: 900

# Рубрика на каждый день недели (0 = понедельник ... 6 = воскресенье)
schedule:
  0: news
  1: tool
  2: prompt
  3: lifehack
  4: digest
  5: poll
  6: fun

# RSS-источники для рубрик news / digest (ротация, дубликаты отбрасываются).
# Оставлены общие ИИ-источники — новости индустрии всё равно релевантны
# маркетологам, просто пересказ теперь через призму "что это значит для
# бизнеса" (см. rubric_prompts.news ниже).
rss_feeds:
  - https://techcrunch.com/tag/artificial-intelligence/feed/
  - https://feeds.feedburner.com/venturebeat/SZYF
  - https://hnrss.org/newest?q=AI+OR+LLM+OR+%22machine+learning%22
  - https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
  - https://arstechnica.com/ai/feed/
  - https://www.technologyreview.com/topic/artificial-intelligence/feed
  - https://openai.com/news/rss.xml
  - https://blog.google/technology/ai/rss/
  - https://www.deepmind.com/blog/rss.xml
  - https://www.wired.com/feed/tag/ai/latest/rss
  - https://habr.com/ru/rss/hubs/artificial_intelligence/all/?fl=ru

# Куратируемый список ИИ-инструментов для маркетинга/бизнеса — ротируется
# по кругу, чтобы не зависеть от случайных источников
tools:
  - name: "ChatGPT"
    url: "https://chat.openai.com"
    note: "тексты, брифы, ответы клиентам, мозговой штурм — универсальный помощник"
  - name: "Canva Magic Studio"
    url: "https://www.canva.com/magic-studio"
    note: "генерация рекламных креативов и баннеров без дизайнера"
  - name: "Perplexity"
    url: "https://www.perplexity.ai"
    note: "быстрый анализ рынка и конкурентов с реальными источниками"
  - name: "HeyGen"
    url: "https://www.heygen.com"
    note: "видео с ИИ-аватаром для рекламы и обучающих роликов без камеры и актёра"
  - name: "Gamma"
    url: "https://gamma.app"
    note: "презентации и коммерческие предложения за 10 минут по одному описанию"
  - name: "ManyChat AI"
    url: "https://manychat.com"
    note: "автоответы и воронки в мессенджерах без ручной настройки сценариев"
  - name: "Midjourney"
    url: "https://www.midjourney.com"
    note: "визуалы для соцсетей и рекламы, когда нужно уникальное изображение"

# Темы для рубрики "prompt" — конкретные маркетинговые/бизнес-задачи,
# под каждую ИИ придумывает готовый копируемый промпт
prompt_topics:
  - "рекламный текст для поста в Instagram/VK под конкретный продукт"
  - "контент-план на месяц для соцсетей малого бизнеса"
  - "анализ отзывов клиентов и выделение главных болей"
  - "скрипт холодного звонка для менеджера по продажам"
  - "оффер для лендинга, который выделяется на фоне конкурентов"
  - "email-цепочка для воронки продаж на 5 писем"
  - "бриф для дизайнера по фирменному стилю"
  - "разбор целевой аудитории по методу JTBD"
  - "текст вакансии, который привлекает нужных кандидатов"
  - "SEO-описание для карточки товара на маркетплейсе"

# Темы для рубрики "lifehack" — реальные бизнес-задачи, где ИИ экономит
# конкретное время или деньги
lifehack_topics:
  - "создание рекламных креативов без найма дизайнера"
  - "быстрый анализ тональности сотен отзывов о бренде"
  - "подготовка коммерческого предложения под конкретного клиента"
  - "автоматизация ответов в чате поддержки на частые вопросы"
  - "составление контент-плана публикаций на месяц вперёд"
  - "анализ сайтов и цен конкурентов без ручного мониторинга"
  - "подготовка презентации для инвестора за один вечер"
  - "адаптация рекламной кампании под новый регион/язык"
  - "быстрая финансовая модель для нового продукта"
  - "подготовка коммерческого договора по типовому шаблону"

# Темы для рубрики "fun" — конкретные события из истории ИИ и маркетинга,
# чтобы каждый раз не получать один и тот же очевидный факт
fun_topics:
  - "ELIZA — первый чат-бот-психотерапевт, 1966 год"
  - "почему первая 'ИИ-зима' в 1970-х оставила исследователей без денег"
  - "как программа Deep Blue обыграла Каспарова в шахматы"
  - "как AlphaGo обыграла Ли Седоля в игру Go, которую считали неподвластной ИИ"
  - "провал модели Galactica от Meta в 2022 году — её отключили за 3 дня"
  - "первая в истории реклама, полностью сгенерированная ИИ, и реакция на неё"
  - "как алгоритм рекомендаций TikTok предсказывает тренды раньше людей"
  - "скандал с чат-ботом Tay от Microsoft, которого за сутки испортили пользователи"
  - "почему OpenAI сначала не хотела выпускать GPT-2, считая его 'слишком опасным'"
  - "как IBM Watson обыграл чемпионов в телешоу Jeopardy"
  - "мысленный эксперимент 'максимизатор скрепок' про опасность ИИ с неверной целью"
  - "первый в истории перцептрон Розенблатта и завышенные ожидания от него в 1958"

# Промпты-инструкции для каждой рубрики — часть профиля, а не кода, чтобы
# разные ниши/каналы могли иметь совершенно разные формулировки
rubric_prompts:
  news: >
    Рубрика 'Новость дня'. Вот новость из мира ИИ:

    Заголовок: {title}
    Описание: {summary}
    Ссылка: {link}

    Перескажи суть простыми словами и обязательно добавь короткий абзац
    'Что это значит для тебя' — практический вывод именно для маркетолога
    или владельца бизнеса: как это можно использовать или на что обратить
    внимание. В конце укажи ссылку на источник.
  digest: >
    Рубрика 'Дайджест недели'. Вот несколько новостей ИИ за неделю:

    {items}

    Сделай дайджест: 4-5 пунктов списком, каждый — одна суть без воды,
    с акцентом на то, что это значит для бизнеса/маркетинга, с указанием
    источника в конце строки.
  tool: >
    Рубрика 'Инструмент дня'. Расскажи про инструмент {name} ({url}).
    Короткая заметка: {note}. Опиши, для какой конкретной маркетинговой
    или бизнес-задачи он полезен, и приведи один жизненный пример
    использования с ориентировочной экономией времени или денег.
    В конце дай ссылку {url}.
  prompt: >
    Рубрика 'Промпт дня'. Тема: {topic}.
    Придумай и покажи один готовый промпт для нейросети под эту задачу —
    текст промпта дай отдельным блоком, который можно скопировать целиком.
    Перед промптом — 1-2 предложения, для чего он нужен. После — короткий
    совет, как его доработать под свой бизнес.
  lifehack: >
    Рубрика 'Кейс/лайфхак'. Тема: {topic}.
    Придумай короткую реалистичную историю (от первого лица не нужно,
    пиши обобщённо), как маркетолог или предприниматель использовал
    нейросеть, чтобы решить именно эту задачу и сэкономить время или
    деньги. Заверши конкретной цифрой результата (время/деньги).
  fun: >
    Рубрика 'Забавный факт про ИИ'. Тема: {topic}.
    Расскажи об этом кратко, живо, с лёгкой иронией, без нравоучений —
    как маленькая интересная история, а не сухая справка.
