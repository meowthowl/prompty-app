# Профиль канала "Копейка" — экономия и права потребителя.
#
# Второй пилотный канал (запущен 22.07.2026) — параллельно с Prompty,
# чтобы сравнить, какая ниша реально набирает аудиторию. Ниша выбрана по
# реальным данным (не по ощущениям): CPM рекламы близок к финансовому
# сегменту (банки/страховые/финтех), но без барьера доверия, характерного
# для тем "куда инвестировать" — здесь только проверяемые факты о правах и
# конкретная экономия, что по исследованиям устойчивее к AI slop.

channel:
  name: "Копейка (экономия и права потребителя)"
  topic_description: "про экономию денег и защиту прав потребителя — конкретные шаблоны претензий, лайфхаки экономии и разборы законов простыми словами"
  tone: >
    Пиши живо и по-человечески, без канцелярита и без вступлений вроде
    "В современном мире...". Обращайся на "ты". Не используй лишние
    эмодзи (максимум 1-2 на пост). Никаких общих фраз "экономьте разумно" —
    только конкретика: сколько денег/времени это сэкономит и что сделать
    прямо сейчас. Не давай юридических консультаций как гарантию результата —
    формулируй как "как правило" и "стоит попробовать", а не как 100% факт.
    Пост должен быть самодостаточным: читатель не переходит по ссылке, если
    не хочет.
  max_post_length: 900

# Рубрика на каждый день недели (0 = понедельник ... 6 = воскресенье)
schedule:
  0: news
  1: tool
  2: prompt
  3: lifehack
  4: digest
  5: poll
  6: fun

# RSS-источники про финансы/экономику/права потребителя (все проверены на
# валидность 22.07.2026)
rss_feeds:
  - https://t-j.ru/feed/
  - https://www.banki.ru/xml/news.rss
  - https://habr.com/ru/rss/hubs/finance/all/?fl=ru
  - https://www.cbr.ru/rss/RssPress
  - https://vc.ru/rss
  - https://rg.ru/xml/index.xml

# Куратируемый список полезных сервисов — ротируется по кругу
tools:
  - name: "Госуслуги"
    url: "https://www.gosuslugi.ru"
    note: "проверка штрафов, налогов, доступ к льготам и справкам без очередей"
  - name: "Сравни.ру"
    url: "https://www.sravni.ru"
    note: "сравнение вкладов, кредитов и страховок разных банков в одном месте"
  - name: "Народный рейтинг Банки.ру"
    url: "https://www.banki.ru/services/responses"
    note: "реальные отзывы клиентов о банке перед тем, как открыть счёт или взять кредит"
  - name: "Проверка кассового чека (ФНС)"
    url: "https://www.nalog.gov.ru/rn77/service/cheack_cassa/"
    note: "проверка легальности покупки и чека — полезно перед возвратом товара"
  - name: "Мои Финансы"
    url: "https://моифинансы.рф"
    note: "бесплатные курсы и калькуляторы финансовой грамотности от Минфина"
  - name: "Интернет-приёмная ЦБ РФ"
    url: "https://www.cbr.ru/reception/"
    note: "куда жаловаться на банк, страховую или МФО, если нарушили твои права"

# Темы для рубрики "prompt" — здесь это не промпт для нейросети, а готовый
# шаблон документа/претензии на конкретную тему
prompt_topics:
  - "претензия в магазин на возврат бракованного товара"
  - "заявление на возврат страховки при досрочном погашении кредита"
  - "жалоба в Роспотребнадзор на недобросовестного продавца"
  - "претензия в управляющую компанию по качеству услуг"
  - "заявление на возврат денег за отменённый авиарейс"
  - "письмо в банк с требованием пересчитать проценты"
  - "жалоба на спам-звонки от банков и коллекторов"
  - "заявление на отказ от навязанной страховки при кредите"
  - "претензия по гарантии на бытовую технику"
  - "запрос собственной кредитной истории перед подачей на кредит"

# Темы для рубрики "lifehack" — реальные истории экономии денег
lifehack_topics:
  - "как вернуть деньги за бракованный товар без похода в магазин"
  - "как оспорить незаконную комиссию банка"
  - "как сэкономить на страховке при продлении ОСАГО/КАСКО"
  - "как вернуть НДФЛ за лечение или обучение"
  - "как не платить за услугу, которую не оказали"
  - "как снизить платёж по ипотеке через рефинансирование"
  - "как получить компенсацию за задержку авиарейса"
  - "как отказаться от подписки, которая тихо списывает деньги"
  - "как проверить продавца перед крупной покупкой онлайн"
  - "как получить налоговый вычет за покупку квартиры"

# Темы для рубрики "fun" — факты про деньги и историю прав потребителей
fun_topics:
  - "как в СССР и России появился закон о защите прав потребителей"
  - "кто и когда придумал первую кредитную карту"
  - "почему на ценниках часто ставят 999 рублей, а не 1000"
  - "как появились кэшбэк-программы и кто их придумал"
  - "как появилась система страхования банковских вкладов"
  - "почему 'чёрная пятница' называется чёрной"
  - "первый в истории задокументированный случай возврата товара по гарантии"
  - "как появился кредитный рейтинг и кто его придумал"
  - "самая крупная ошибка в истории банковских переводов"
  - "почему копейка называется копейкой"

# Промпты-инструкции для каждой рубрики
rubric_prompts:
  news: >
    Рубрика 'Новость дня'. Вот новость из мира финансов/прав потребителя:

    Заголовок: {title}
    Описание: {summary}
    Ссылка: {link}

    Перескажи суть простыми словами и обязательно добавь короткий абзац
    'Что это значит для тебя' — как это влияет на личный бюджет обычного
    человека. В конце укажи ссылку на источник.
  digest: >
    Рубрика 'Дайджест недели'. Вот несколько новостей за неделю:

    {items}

    Сделай дайджест: 4-5 пунктов списком, каждый — одна суть без воды,
    с указанием источника в конце строки.
  tool: >
    Рубрика 'Сервис дня'. Расскажи про сервис {name} ({url}).
    Короткая заметка: {note}. Опиши, для какой конкретной ситуации он
    полезен, и приведи один жизненный пример использования.
    В конце дай ссылку {url}.
  prompt: >
    Рубрика 'Шаблон дня'. Тема: {topic}.
    Напиши готовый шаблон документа/претензии под эту задачу — текст
    шаблона дай отдельным блоком, который можно скопировать и заполнить
    своими данными. Перед шаблоном — 1-2 предложения, когда он нужен.
    После — короткая заметка, куда и как его подать (лично, почтой,
    через сайт). Обязательно уточни, что это общий шаблон, а не
    индивидуальная юридическая консультация.
  lifehack: >
    Рубрика 'Кейс/лайфхак'. Тема: {topic}.
    Придумай короткую реалистичную историю (от первого лица не нужно,
    пиши обобщённо), как человек решил именно эту задачу и сэкономил
    деньги или время. Заверши конкретной цифрой результата (сумма/срок).
  fun: >
    Рубрика 'Забавный факт'. Тема: {topic}.
    Расскажи об этом кратко, живо, с лёгкой иронией, без нравоучений —
    как маленькая интересная история, а не сухая справка.
