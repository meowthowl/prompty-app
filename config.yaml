# Конфигурация канала "Prompty"

channel:
  name: "Prompty (нейросети и ИИ простыми словами)"
  # Стиль, в котором ИИ должен писать все посты
  tone: >
    Пиши живо и по-человечески, без канцелярита и без вступлений вроде
    "В современном мире...". Обращайся на "ты". Не используй лишние
    эмодзи (максимум 1-2 на пост). Пост должен быть самодостаточным:
    читатель не переходит по ссылке, если не хочет.
  max_post_length: 900 # символов, ориентир для Telegram-постов

# Рубрика на каждый день недели (0 = понедельник ... 6 = воскресенье)
schedule:
  0: news       # Новость дня
  1: tool        # Инструмент дня
  2: prompt      # Промпт дня
  3: lifehack    # Кейс/лайфхак
  4: digest      # Дайджест недели
  5: poll        # Вовлечение (опрос)
  6: fun         # Лёгкий контент/забавный факт

# RSS-источники для рубрик news / digest (ротация, дубликаты отбрасываются).
# Чем больше источников — тем меньше риск застрять без свежих новостей при
# ежедневной публикации рубрики news. Все проверены на валидность 12.07.2026.
rss_feeds:
  - https://techcrunch.com/tag/artificial-intelligence/feed/
  - https://feeds.feedburner.com/venturebeat/SZYF
  - https://hnrss.org/newest?q=AI+OR+LLM+OR+%22machine+learning%22
  - https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
  - https://arstechnica.com/ai/feed/
  - https://www.technologyreview.com/topic/artificial-intelligence/feed
  - https://openai.com/news/rss.xml
  - https://blog.google/technology/ai/rss/
  - https://www.deepmind.com/blog/rss.xml
  - https://www.wired.com/feed/tag/ai/latest/rss
  - https://habr.com/ru/rss/hubs/artificial_intelligence/all/?fl=ru

# Куратируемый список инструментов для рубрики "tool" — ротируется по кругу,
# чтобы не зависеть от случайных источников и не советовать что попало
tools:
  - name: "ChatGPT"
    url: "https://chat.openai.com"
    note: "универсальный ассистент для текста, кода, анализа"
  - name: "Google Gemini"
    url: "https://gemini.google.com"
    note: "хорош в работе с документами и большим контекстом"
  - name: "Perplexity"
    url: "https://www.perplexity.ai"
    note: "поиск с источниками вместо галлюцинаций"
  - name: "NotebookLM"
    url: "https://notebooklm.google"
    note: "превращает твои документы в конспект/подкаст"
  - name: "Midjourney"
    url: "https://www.midjourney.com"
    note: "генерация изображений, топ по качеству картинки"
  - name: "ElevenLabs"
    url: "https://elevenlabs.io"
    note: "синтез речи и клонирование голоса"
  - name: "Cursor"
    url: "https://cursor.com"
    note: "ИИ-редактор кода, автоматизация разработки"

# Темы для рубрики "prompt" — ротируются, ИИ сам придумывает готовый промпт под тему
prompt_topics:
  - "разбор резюме перед отправкой в компанию мечты"
  - "подготовка к сложному разговору с начальником"
  - "составление плана питания на неделю по бюджету"
  - "объяснение сложной темы простыми словами (для ребёнка)"
  - "мозговой штурм названий для нового проекта"
  - "разбор договора на скрытые риски перед подписанием"
  - "подготовка структуры для выступления на 5 минут"
  - "анализ вакансии и подготовка к интервью"
  - "составление плана экономии на месяц"
  - "рерайт текста под разные аудитории (для соцсетей, для email)"

# Темы для рубрики "lifehack" — конкретные бытовые/рабочие задачи, чтобы ИИ
# не придумывал каждый раз одну и ту же обобщённую историю
lifehack_topics:
  - "поиск самого выгодного тарифа связи/интернета"
  - "подготовка к собеседованию на новую работу"
  - "составление жалобы в управляющую компанию или магазин"
  - "перевод инструкции к технике с иностранного языка"
  - "подготовка поздравительной речи на свадьбу друга"
  - "планирование маршрута многодневного путешествия"
  - "составление чек-листа для переезда в новую квартиру"
  - "разбор непонятного пункта в договоре аренды жилья"
  - "составление меню на день рождения ребёнка"
  - "подготовка ответа на сложное письмо от клиента"

# Темы для рубрики "fun" — конкретные события/системы из истории ИИ, чтобы
# каждый раз не получать один и тот же самый очевидный факт (например, ELIZA)
fun_topics:
  - "ELIZA — первый чат-бот-психотерапевт, 1966 год"
  - "почему первый 'ИИ-зима' в 1970-х оставила исследователей без денег"
  - "как программа Deep Blue обыграла Каспарова в шахматы"
  - "как AlphaGo обыграла Ли Седоля в игру Go, которую считали неподвластной ИИ"
  - "почему термин 'искусственный интеллект' придумали на конференции в Дартмуте в 1956"
  - "скандал с чат-ботом Tay от Microsoft, которого за сутки испортили пользователи"
  - "мысленный эксперимент 'китайская комната' Джона Сёрла"
  - "почему OpenAI сначала не хотела выпускать GPT-2, считая его 'слишком опасным'"
  - "программа SHRDLU и мир кубиков, с которым она разговаривала на естественном языке"
  - "как IBM Watson обыграл чемпионов в телешоу Jeopardy"
  - "мысленный эксперимент 'максимизатор скрепок' про опасность ИИ с неверной целью"
  - "первый в истории перцептрон Розенблатта и завышенные ожидания от него в 1958"
